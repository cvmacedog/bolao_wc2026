name: Update World Cup 2026 Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Ensure data directory exists
        run: mkdir -p data
      
      - name: Download schedule data
        run: curl -o data/schedule-raw.json https://raw.githubusercontent.com/mjwebmaster/world-cup-2026-schedule-data/main/world-cup-2026-schedule.json
        
      - name: Convert schedule with debug
        run: |
          echo "Python version:"
          python --version
          echo "Current directory:"
          pwd
          echo "Files in data/:"
          ls -la data/
          echo "Running conversion script..."
          python tools/convert_schedule.py 2>&1
          echo "Conversion exit code: $?"
          echo "Files in data/ after conversion:"
          ls -la data/
          echo "Checking if matches.json was modified:"
          stat data/matches.json
          echo "First 30 lines of new matches.json:"
          head -30 data/matches.json
        
      - name: Check what changed
        run: |
          echo "Git diff summary:"
          git diff --stat data/matches.json
          echo "Git diff (first 100 lines):"
          git diff data/matches.json | head -100
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "mata-mata definido" || echo "No changes to commit"
          for i in {1..5}; do
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            git pull --rebase origin main
            sleep 2
          done
