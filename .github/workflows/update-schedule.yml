name: Update World Cup 2026 Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Ensure data directory exists
        run: mkdir -p data
      
      - name: Download schedule data
        run: |
          echo "Downloading schedule..."
          curl -v -o data/schedule-raw.json https://raw.githubusercontent.com/mjwebmaster/world-cup-2026-schedule-data/main/world-cup-2026-schedule.json
          echo "Download complete. File size:"
          ls -lh data/schedule-raw.json
          echo "First 100 lines of downloaded file:"
          head -100 data/schedule-raw.json
        
      - name: Convert schedule
        run: |
          echo "Running conversion script..."
          python tools/convert_schedule.py
          echo "Conversion complete. New file:"
          ls -lh data/matches.json
          echo "First 50 lines of converted file:"
          head -50 data/matches.json
        
      - name: Check what changed
        run: |
          echo "Git status:"
          git status
          echo "Git diff:"
          git diff data/matches.json | head -50
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "mata-mata definido" || exit 0
          for i in {1..5}; do
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            git pull --rebase origin main
            sleep 2
          done
