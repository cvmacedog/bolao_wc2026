name: Update World Cup 2026 Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Ensure data directory exists
        run: mkdir -p data
      
      - name: Download schedule data
        run: curl -o data/schedule-raw.json https://raw.githubusercontent.com/mjwebmaster/world-cup-2026-schedule-data/main/world-cup-2026-schedule.json
        
      - name: Verify downloaded file
        run: ls -lh data/schedule-raw.json
        
      - name: Convert schedule
        run: python tools/convert_schedule.py
        
      - name: Verify converted file
        run: ls -lh data/matches.json && head -20 data/matches.json
        
      - name: Check git status
        run: git status
        
      - name: Commit and push changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/schedule-raw.json data/matches.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "mata-mata definido"
            git push
          fi
